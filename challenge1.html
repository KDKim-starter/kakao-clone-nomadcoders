<!doctype html>
<html lang="en">
  <head>
    <title>Kokoa Challenge</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
  </head>
  <body>
    <form>
      <div>
        <label for="first">First name</label>
        <input id="first" type="text" required />
      </div>

      <div>
        <label for="last">Last name</label>
        <input id="last" type="text" required />
      </div>

      <div>
        <label for="email">Email</label>
        <input id="email" type="email" required />
      </div>

      <div>
        <label for="user">Username</label>
        <input id="user" type="text" required />
      </div>

      <div>
        <label for="password">Password</label>
        <input id="password" type="password" minlength="10" required />
      </div>

      <div>
        <label for="date">Birth date</label>
        <input id="date" type="date" required />
      </div>

      <div>
        <label for="range">How happy are you?</label>
        <input id="range" type="range" />
      </div>

      <div>
        <label for="color">What is your fav.color?</label>
        <input id="color" type="color" />
      </div>

      <div>
        <input type="submit" value="Create Account" />
      </div>
    </form>
  </body>
</html>
