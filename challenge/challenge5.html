<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>challenge5</title>
    <link rel="stylesheet" href="CSS/challenge5.css" />
  </head>
  <body>
    <header class="header-play">
      <svg
        class="icon-x"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 32 32"
        fill="none"
      >
        <path
          d="M9 9l14 14M23 9 9 23"
          stroke="currentColor"
          stroke-width="6"
          stroke-linecap="round"
        />
      </svg>
      <div class="header-play__text">
        <span>Playlist</span>
      </div>
      <div class="emtpy"></div>
    </header>

    <div class="album">
      <img class="album__photo" src="image2/flower.jpg" />
      <div class="albume-text">
        <div class="album-text">
          <span class="album-text__title">Random Love</span>
          <span class="album-text__producer">by Divay Kapoor</span>
        </div>
      </div>
    </div>

    <form class="control" action="">
      <div class="control-play">
        <input type="button" value="Play" />
      </div>
      <div class="option">
        <input type="button" />
        <input type="button" />
      </div>
    </form>

    <div class="playlist">
      <div class="playlist__color"></div>
      <div class="playlist__text">
        <h3>Matargasti</h3>
        <h6>Mohit Chauhan</h6>
      </div>
    </div>

    <div class="playlist">
      <div class="playlist__color playlist__color--purple"></div>
      <div class="playlist__text">
        <h3>Attitue</h3>
        <h6>Lewis Ofman - Attitute</h6>
      </div>
    </div>

    <div class="playlist">
      <div class="playlist__color playlist__color--blue"></div>
      <div class="playlist__text">
        <h3>Try Everting</h3>
        <h6>Shakira - Zootopia</h6>
      </div>
    </div>

    <div class="playlist">
      <div class="playlist__color playlist__color--green"></div>
      <div class="playlist__text">
        <h3>Sunflower</h3>
        <h6>Joseph Vincent - Sunflower</h6>
      </div>
    </div>
  </body>
</html>
