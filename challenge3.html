<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Challenge3</title>
    <style>
      body {
        display: flex;
        height: 100vh;
        background-color: beige;
        justify-content: center;
      }

      span {
        margin: 100px 0px;
        font-family: "Times New Roman", Times, serif;
        display: block;
        font-size: 50px;
        font-weight: 700;
      }

      div {
        height: 500px;
        width: 250px;
        border: solid 5px white;
        margin: 0px 10px;
      }

      div:first-of-type {
        background-color: tomato;
      }
      div:nth-of-type(2) {
        background-color: teal;
      }
      div:nth-of-type(3) {
        background-color: Burlywood;
      }
      div:nth-of-type(4) {
        background-color: Thistle;
      }

      div span {
        display: block;
        font-size: 30px;
        font-weight: 500;
        background-color: white;
        padding: 10px;
      }

      div span:first-child {
        margin: 20px 0px 0px 0px;
      }

      div span:last-child {
        font-size: 20px;
        margin: 0px;
      }
    </style>
  </head>
  <body>
    <span>The Best Colors</span>
    <div>
      <span>Tomato</span>
      <span>#FF6347</span>
    </div>
    <div>
      <span>Teal</span>
      <span>#008080</span>
    </div>
    <div>
      <span>Burlywood</span>
      <span>#DEB887</span>
    </div>
    <div>
      <span>Thistle</span>
      <span>#D7BFD7</span>
    </div>
  </body>
</html>
