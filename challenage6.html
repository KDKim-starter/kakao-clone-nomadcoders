<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>challenge6</title>
    <link rel="stylesheet" href="CSS/challenge6.css" />
  </head>
  <body>
    <div class="main-box">
      <div class="header-lib">
        <i class="fa-solid fa-bars-staggered"></i>
        <span>library</span>
        <i class="fa-solid fa-basket-shopping"></i>
        <form class="main-search">
          <input type="text" placeholder="Search books..." />
          <i class="fa-solid fa-magnifying-glass"></i>
        </form>
      </div>

      <section class="reco">
        <span class="reco-title">Book of the day</span>
        <div class="reco-info">
          <img
            src="https://shopping-phinf.pstatic.net/main_3878746/38787460621.20260331103645.jpg?type=w300"
          />
          <div class="reco-info__text">
            <h3>바다가 들리는 편의점</h3>
            <h6>마치다 소노코</h6>
            <div class="mark-star">
              <i class="fa-solid fa-star fa-xs fa-star--ye"></i>
              <i class="fa-solid fa-star fa-xs fa-star--ye"></i>
              <i class="fa-solid fa-star fa-xs fa-star--ye"></i>
              <i class="fa-solid fa-star fa-xs fa-star--ye"></i>
              <i class="fa-solid fa-star fa-xs fa-star--op"></i>
            </div>
            <div class="book-type">
              <span>Love</span>
              <span>Japan Fiction</span>
            </div>
            <div class="reco-shop">
              <form class="reco-shop__like">
                <div class="reco-shop__con">
                  <i class="fa-solid fa-bookmark"></i>
                  <input type="button" class="shop-btn" />
                </div>
              </form>
              <form class="reco-shop__book">
                <input type="button" value="Book Now" />
              </form>
            </div>
          </div>
        </div>
      </section>
    </div>
    <script
      src="https://kit.fontawesome.com/1e02fc2852.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
