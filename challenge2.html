<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        display: flex;
        height: 100vh;
        justify-content: center;
        align-items: center;
        background-color: tomato;
      }
      .outer {
        display: flex;
        justify-content: space-evenly;
        flex-direction: column;
        align-items: center;
        background-color: antiquewhite;
        border: solid 5px black;
        height: 500px;
        width: 500px;
      }
      .inner {
        background-color: cadetblue;
        height: 100px;
        width: 100px;
        border: solid 5px white;
      }

      .inner:first-child {
      }

      .inner:nth-child(2) {
        border: dashed 5px white;
        width: 400px;
      }

      .inner:last-child {
      }
    </style>
  </head>
  <body>
    <div class="outer">
      <div class="inner"></div>
      <div class="inner"></div>
      <div class="inner"></div>
    </div>
  </body>
</html>
