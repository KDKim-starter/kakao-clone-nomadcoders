<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>challenge7</title>
    <link rel="stylesheet" href="CSS/challenge7.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="group">
        <div class="top-fix">
          <div class="top-fix__arrow">
            <i class="fa-solid fa-arrow-left"></i>
          </div>
          <div class="top-fix__icon">
            <i class="fa-solid fa-magnifying-glass"></i>
          </div>
        </div>
        <div class="music-info">
          <div class="music-info__photo">
            <img
              src="https://i.namu.wiki/i/dnEoQpcHB9ga8lfKy29dKutpGzfC7ACy3srg6MvfR8-e_VW3-SMuDv9QqJoA6RvqqKIpfukZCAXp2Bt9qzz48OwsxCs2R404_oflK6Yykhas1-HbLnhN_FY5QaZxuqbN-moCuuEUi6Nw3oXwY5XXmA.webp"
            />
          </div>
          <div class="music-info__title">G-Dragon</div>
          <div class="music-info__type">Singer-songwriter</div>
          <div class="music-info__btn">
            <div class="btn">Shuffle</div>
            <div class="btn btn--white">
              <i class="fa-solid fa-heart"></i>
              <span>30만</span>
            </div>
          </div>
        </div>
        <ul class="music-playlist">
          <li class="music-playlist__song">
            <div class="music-playlist__info">
              <img
                src="https://i.namu.wiki/i/FKXnSgLe1S9DjKAL1nYLn-kihBotJ6iTGHgaLzGU_zIE2BtB6a5aRO7-kENKOcr5z-zSk4ZnrbvfP0rrOAEu9cB1cZ6oVQ03GtHwdHlB9m2CjVBMvdZsMfwVxSHZSvR_fhujm4ZBVhZPLbc_6ceH9g.webp"
              />
              <div class="music-playlist__text">
                <div class="music-playlist__info__musician">G-Dragon</div>
                <div class="music-playlist__info__title">HOME SWEET HOME</div>
              </div>
            </div>
            <div class="top-fix__icon top-fix__icon--op">
              <i class="fa-solid fa-ellipsis-vertical"></i>
            </div>
          </li>
          <li class="music-playlist__song music-playlist__song--play">
            <div class="music-playlist__info">
              <img
                src="https://i.namu.wiki/i/aSj7Vcy-ZjjIrdaiIPLtEqNrOeGukGNyZoBFocqHUwaGrkGzT1hkPgNYUz--nQdyBXxqPxsmC5iqqLRVe8ljckymE_DjnuSoGIV6IPbO55ykNjfz6hArbqjA7ZrwxQGIcGROGEUKqBLGgclwq5w9Uw.webp"
              />
              <div class="music-playlist__icon">
                <i class="fa-solid fa-align-left"></i>
              </div>
              <div class="music-playlist__text">
                <div class="music-playlist__info__musician">GD x Taeyang</div>
                <div class="music-playlist__info__title">Good boy</div>
              </div>
            </div>
            <div class="top-fix__icon top-fix__icon--op">
              <i class="fa-solid fa-ellipsis-vertical"></i>
            </div>
          </li>
          <li class="music-playlist__song">
            <div class="music-playlist__info">
              <img
                src="https://i.namu.wiki/i/mQseq-FyaBqZ4k8R6yHCfYxMeeS64uPKpxg0sX5yGP8MCL0pYzBfONDEeKlq2IUMA8VSwV3OlneaXI3uinRlu28uDTuYysT9l6U02D08hc_Xdq43JC4DHai__Tcvadj9esSfr-iqzmRZVg6-lTCyQQ.webp"
              />
              <div class="music-playlist__text">
                <div class="music-playlist__info__musician">G-Dragon</div>
                <div class="music-playlist__info__title">Heartbreaker</div>
              </div>
            </div>
            <div class="top-fix__icon top-fix__icon--op">
              <i class="fa-solid fa-ellipsis-vertical"></i>
            </div>
          </li>
          <li class="music-playlist__song">
            <div class="music-playlist__info">
              <img
                src="https://i.namu.wiki/i/LeLogQtQ4cE5uAdd7JhRdrdmfeKatU6DUKTNuSCoMVo0cc5vt3CGMSXPN7948rnZITL0-jsdumkVfITqutxNuma_njV-zcmrR9pWwKrA4Mf7u-yBt1ofeYrXnwHu3mCGn9AkMs_a0wmO8ckBATBrPg.webp"
              />
              <div class="music-playlist__text">
                <div class="music-playlist__info__musician">G-Dragon</div>
                <div class="music-playlist__info__title">PO￦ER</div>
              </div>
            </div>
            <div class="top-fix__icon top-fix__icon--op">
              <i class="fa-solid fa-ellipsis-vertical"></i>
            </div>
          </li>
        </ul>
        <div class="control-bar">
          <div>
            <div class="music-playlist__info__musician">GD x Teayang</div>
            <div class="music-playlist__info__title">Good Boy</div>
          </div>
          <div class="control-bar__icon">
            <i class="fa-solid fa-backward-step"></i>
            <i class="fa-solid fa-pause fa-xl"></i>
            <i class="fa-solid fa-forward-step"></i>
          </div>
        </div>
      </div>
      <div class="group">
        <div class="top-fix">
          <div class="top-fix__arrow">
            <i class="fa-solid fa-arrow-left"></i>
          </div>
          <div class="top-fix__icon">
            <i class="fa-solid fa-ellipsis-vertical"></i>
          </div>
        </div>
        <div class="music-info music-info music-info music-info--big">
          <div class="music-info__photo music-info__photo--big">
            <img
              src="https://i.namu.wiki/i/aSj7Vcy-ZjjIrdaiIPLtEqNrOeGukGNyZoBFocqHUwaGrkGzT1hkPgNYUz--nQdyBXxqPxsmC5iqqLRVe8ljckymE_DjnuSoGIV6IPbO55ykNjfz6hArbqjA7ZrwxQGIcGROGEUKqBLGgclwq5w9Uw.webp"
            />
          </div>
          <div class="music-info__title">GD x Taeyang, Good boy</div>
          <div class="music-info__type">Hip-hop</div>
        </div>
        <div class="play-time">
          <div class="play-time__time">
            <span>1:10</span>
            <span>4:05</span>
          </div>
        </div>
        <div class="play-processbar">
          <div class="play-processbar__whole"></div>
          <div class="play-processbar__now"></div>
          <div class="play-processbar__circle"></div>
        </div>
        <div class="play-control-bar">
          <div class="icon-op"><i class="fa-solid fa-repeat"></i></div>
          <div class="icon-nomal">
            <i class="fa-solid fa-backward-step"></i>
          </div>
          <div class="icon-big"><i class="fa-solid fa-play"></i></div>
          <div class="icon-nomal"><i class="fa-solid fa-forward-step"></i></div>
          <div class="icon-op"><i class="fa-solid fa-shuffle"></i></div>
        </div>
      </div>

      <script
        src="https://kit.fontawesome.com/1e02fc2852.js"
        crossorigin="anonymous"
      ></script>
    </div>
  </body>
</html>
