<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friends - Kokoa Clone</title>
    <link rel="stylesheet" href="CSS/style.css" />
  </head>
  <body>
    <div class="status-bar">
      <div class="status-bar__column">
        <span>No Service</span>
        <svg class="status-bar__column__wifi" aria-hidden="true">
          <use href="SVG/icons.svg#wifi"></use>
        </svg>
      </div>
      <div class="status-bar__column">
        <span>18:43</span>
      </div>
      <div class="status-bar__column">
        <span>110%</span>
        <svg class="status-bar__column__battery" aria-hidden="true">
          <use href="SVG/icons.svg#battery"></use>
        </svg>
      </div>
    </div>

    <header class="screen-header">
      <h1 class="screen-header__title">Friends</h1>
      <div class="screen-header__icons">
        <svg aria-hidden="true">
          <use href="SVG/icons.svg#search"></use>
        </svg>

        <span class="screen-header__music">
          <svg aria-hidden="true">
            <use href="SVG/icons.svg#music"></use>
          </svg>
        </span>
        <span class="screen-header__cog">
          <svg aria-hidden="true">
            <use href="SVG/icons.svg#cog"></use>
          </svg>
        </span>
      </div>
    </header>

    <a id="friends-display-link">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="15" fill="currentColor" />
        <circle cx="16" cy="9.2" r="2.1" fill="white" />
        <path
          d="M13.3 13.8H18.7V24.2H21V26H11V24.2H13.3V15.6H11.8V13.8H13.3Z"
          fill="white"
        />
      </svg>
      Friends' Names Display
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
        <path
          d="M11.5 5 22 15.5 11.5 26 8.5 23 16 15.5 8.5 8 11.5 5Z"
          fill="currentColor"
        />
      </svg>
    </a>

    <main class="friends-screen">
      <div class="user-components">
        <div class="user-components__column">
          <img
            class="user-components__profile-photo user-components__profile-photo--xl"
            src="https://images.freeimages.com/images/large-previews/1f3/blue-sky-1193744.jpg?fmt=avif&h=350"
          />
          <div class="user-components__text">
            <h4 class="user-components__chat-name">Kyung duk</h4>
            <!--<h6 class="user-components__subtitle">text whater I want</h6> -->
          </div>
        </div>
        <div class="user-components__column"></div>
      </div>
      <div class="user-screen__channel">
        <div class="user-screen__channel-header">
          <span>Channel</span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 32 32"
            fill="none"
          >
            <path
              d="M5 20.5 15.5 10 26 20.5 23 23.5 15.5 16 8 23.5 5 20.5Z"
              fill="currentColor"
            />
          </svg>
        </div>
        <div class="user-components">
          <div class="user-components__column">
            <img
              class="user-components__profile-photo user-components__profile-photo--sm"
              src="https://images.freeimages.com/images/large-previews/1f3/blue-sky-1193744.jpg?fmt=avif&h=350"
            />
            <div class="user-components__text user-components__text--not-bold">
              <h4 class="user-components__chat-name">Channel</h4>
            </div>
          </div>
          <div class="user-components__column">
            <span>2</span>
            <svg aria-hidden="true">
              <use href="SVG/icons.svg#arrow"></use>
            </svg>
          </div>
        </div>
      </div>
    </main>

    <nav class="nav">
      <ul class="nav__list">
        <li class="nav__btn">
          <a href="friends.html">
            <svg aria-hidden="true">
              <use href="SVG/icons.svg#friend-fill"></use>
            </svg>
          </a>
        </li>
        <li class="nav__btn">
          <a class="nav__link" href="chats.html">
            <span class="nav__notification">1</span>
            <svg aria-hidden="true">
              <use href="SVG/icons.svg#nav-chat"></use>
            </svg>
          </a>
        </li>
        <li class="nav__btn">
          <a class="nav__link" href="find.html">
            <svg aria-hidden="true">
              <use href="SVG/icons.svg#find"></use>
            </svg>
          </a>
        </li>
        <li class="nav__btn">
          <a class="nav__link" href="more.html">
            <span class="nav__reddot"></span>
            <svg aria-hidden="true">
              <use href="SVG/icons.svg#dot"></use>
            </svg>
          </a>
        </li>
      </ul>
    </nav>
    <div id="no-mobile">
      <span>Your screen is too big!!</span>
    </div>
  </body>
</html>
