<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friends - Kokoa Clone</title>
    <link rel="stylesheet" href="CSS/style.css" />
  </head>
  <body>
    <div class="status-bar">
      <div class="status-bar__column">
        <span>No Service</span>
        <svg
          class="status-bar__column__wifi"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 32 32"
          fill="none"
        >
          <g fill="currentColor">
            <path
              d="M4.5 12.2a1.35 1.35 0 0 1 0-1.9C7.35 7.5 11.43 6 16 6s8.65 1.5 11.5 4.3a1.35 1.35 0 1 1-1.9 1.93C23.25 9.93 19.8 8.7 16 8.7s-7.25 1.23-9.6 3.53a1.35 1.35 0 0 1-1.9-.03Z"
              fill="currentColor"
            />
            <path
              d="M7.85 15.6a1.35 1.35 0 0 1 .05-1.9c2.07-1.97 4.94-3.1 8.1-3.1s6.03 1.13 8.1 3.1a1.35 1.35 0 1 1-1.86 1.96c-1.57-1.5-3.8-2.36-6.24-2.36s-4.67.86-6.24 2.36a1.35 1.35 0 0 1-1.91-.06Z"
              fill="currentColor"
            />
            <path
              d="M11.1 18.95a1.35 1.35 0 0 1 .08-1.9A6.91 6.91 0 0 1 16 15.1c1.9 0 3.65.74 4.82 1.95a1.35 1.35 0 0 1-1.94 1.87A4.22 4.22 0 0 0 16 17.8c-1.18 0-2.27.44-3.02 1.12a1.35 1.35 0 0 1-1.88.03Z"
              fill="currentColor"
            />
            <circle cx="16" cy="22.4" r="2.4" fill="currentColor" />
          </g>
        </svg>
      </div>
      <div class="status-bar__column">
        <span>18:43</span>
      </div>
      <div class="status-bar__column">
        <span>110%</span>
        <svg
          class="status-bar__column__battery"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 32 32"
          fill="none"
        >
          <rect
            x="4"
            y="9"
            width="24"
            height="14"
            rx="2.5"
            stroke="currentColor"
            stroke-width="1.8"
          />
          <rect
            x="28"
            y="12"
            width="2"
            height="8"
            rx="0.8"
            fill="currentColor"
          />
          <rect
            x="6.2"
            y="11.2"
            width="18.6"
            height="9.6"
            rx="1.2"
            fill="currentColor"
          />
        </svg>
        <svg
          class="status-bar__column__bolt"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 32 32"
          fill="none"
        >
          <path
            d="M18.8 2.8 8.8 17h8.3l-3.9 12.2L23.2 15h-8.4l4-12.2Z"
            fill="currentColor"
          />
        </svg>
      </div>
    </div>

    <header class="screen-header">
      <h1 class="screen-header__title">Friends</h1>
      <div class="screen-header__icons">
        <span class="screen-header__search">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 64 64"
            fill="none"
          >
            <circle
              cx="28"
              cy="28"
              r="16"
              stroke="currentColor"
              stroke-width="4"
            />
            <line
              x1="39.5"
              y1="39.5"
              x2="54"
              y2="54"
              stroke="currentColor"
              stroke-width="4"
              stroke-linecap="round"
            />
          </svg>
        </span>
        <span class="screen-header__music">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 32 32"
            fill="none"
          >
            <g transform="rotate(-4 16 16)">
              <g transform="rotate(-18 10.2 23.2)">
                <ellipse
                  cx="10.2"
                  cy="23.2"
                  rx="4.2"
                  ry="3.1"
                  fill="currentColor"
                />
                <ellipse cx="10.2" cy="23.2" rx="2.5" ry="1.8" fill="white" />
              </g>

              <g transform="rotate(-18 22.3 23.1)">
                <ellipse
                  cx="22.3"
                  cy="23.1"
                  rx="4.2"
                  ry="3.1"
                  fill="currentColor"
                />
                <ellipse cx="22.3" cy="23.1" rx="2.5" ry="1.8" fill="white" />
              </g>

              <rect
                x="13.0"
                y="4.3"
                width="1.3"
                height="18.3"
                fill="currentColor"
              />
              <rect
                x="25.0"
                y="3.0"
                width="1.3"
                height="18.7"
                fill="currentColor"
              />

              <polygon
                points="13.0,4.3 26.3,2.9 26.3,4.7 13.0,6.1"
                fill="currentColor"
              />
              <polygon
                points="13.0,8.3 26.3,6.9 26.3,8.7 13.0,10.1"
                fill="currentColor"
              />
            </g>
          </svg>
        </span>
        <span class="screen-header__cog">
          <svg
            class="fa-cog"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 32 32"
            fill="none"
          >
            <g fill="currentColor" fill-rule="evenodd" clip-rule="evenodd">
              <path
                d="M14.8 4.4c-.24 0-.45.21-.45.45v1.55c-1 .21-1.94.6-2.79 1.15l-1.1-1.1a.45.45 0 0 0-.64 0L8.21 8.1a.45.45 0 0 0 0 .64l1.1 1.1c-.55.85-.94 1.79-1.15 2.79H6.61c-.24 0-.45.21-.45.45v2.29c0 .24.21.45.45.45h1.55c.21 1 .6 1.94 1.15 2.79l-1.1 1.1a.45.45 0 0 0 0 .64l1.61 1.61c.18.18.46.18.64 0l1.1-1.1c.85.55 1.79.94 2.79 1.15v1.55c0 .24.21.45.45.45h2.4c.24 0 .45-.21.45-.45v-1.55c1-.21 1.94-.6 2.79-1.15l1.1 1.1c.18.18.46.18.64 0l1.61-1.61a.45.45 0 0 0 0-.64l-1.1-1.1c.55-.85.94-1.79 1.15-2.79h1.55c.24 0 .45-.21.45-.45v-2.29c0-.24-.21-.45-.45-.45h-1.55c-.21-1-.6-1.94-1.15-2.79l1.1-1.1a.45.45 0 0 0 0-.64l-1.61-1.61a.45.45 0 0 0-.64 0l-1.1 1.1c-.85-.55-1.79-.94-2.79-1.15V4.85c0-.24-.21-.45-.45-.45h-2.4Zm.75 1.55h.9v1.86l.4.06c1.12.17 2.17.61 3.08 1.27l.34.24 1.31-1.31.64.64-1.31 1.31.24.34c.66.91 1.1 1.96 1.27 3.08l.06.4h1.86v.9h-1.86l-.06.4c-.17 1.12-.61 2.17-1.27 3.08l-.24.34 1.31 1.31-.64.64-1.31-1.31-.34.24c-.91.66-1.96 1.1-3.08 1.27l-.4.06v1.86h-.9v-1.86l-.4-.06c-1.12-.17-2.17-.61-3.08-1.27l-.34-.24-1.31 1.31-.64-.64 1.31-1.31-.24-.34c-.66-.91-1.1-1.96-1.27-3.08l-.06-.4H7.71v-.9h1.86l.06-.4c.17-1.12.61-2.17 1.27-3.08l.24-.34-1.31-1.31.64-.64 1.31 1.31.34-.24c.91-.66 1.96-1.1 3.08-1.27l.4-.06V5.95Z"
              />
              <path
                d="M16 9.25a4.95 4.95 0 1 0 0 9.9 4.95 4.95 0 0 0 0-9.9Zm0 1.45a3.5 3.5 0 1 1 0 7 3.5 3.5 0 0 1 0-7Z"
              />
            </g>
          </svg>
        </span>
      </div>
    </header>

    <a id="friends-display-link">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="15" fill="currentColor" />
        <circle cx="16" cy="9.2" r="2.1" fill="white" />
        <path
          d="M13.3 13.8H18.7V24.2H21V26H11V24.2H13.3V15.6H11.8V13.8H13.3Z"
          fill="white"
        />
      </svg>
      Friends' Names Display
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
        <path
          d="M11.5 5 22 15.5 11.5 26 8.5 23 16 15.5 8.5 8 11.5 5Z"
          fill="currentColor"
        />
      </svg>
    </a>

    <main class="friends-screen">
      <div class="user-components">
        <div class="user-components__column">
          <img
            class="user-components__profile-photo user-components__profile-photo--xl"
            src="https://images.freeimages.com/images/large-previews/1f3/blue-sky-1193744.jpg?fmt=avif&h=350"
          />
          <div class="user-components__text">
            <h4 class="user-components__chat-name">Kyung duk</h4>
            <!--<h6 class="user-components__subtitle">text whater I want</h6> -->
          </div>
        </div>
        <div class="user-components__column"></div>
      </div>
      <div class="user-screen__channel">
        <div class="user-screen__channel-header">
          <span>Channel</span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 32 32"
            fill="none"
          >
            <path
              d="M5 20.5 15.5 10 26 20.5 23 23.5 15.5 16 8 23.5 5 20.5Z"
              fill="currentColor"
            />
          </svg>
        </div>
        <div class="user-components">
          <div class="user-components__column">
            <img
              class="user-components__profile-photo user-components__profile-photo--sm"
              src="https://images.freeimages.com/images/large-previews/1f3/blue-sky-1193744.jpg?fmt=avif&h=350"
            />
            <div class="user-components__text user-components__text--not-bold">
              <h4 class="user-components__chat-name">Channel</h4>
            </div>
          </div>
          <div class="user-components__column">
            <span>2</span>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 32 32"
              fill="none"
            >
              <path
                d="M11.5 5 22 15.5 11.5 26 8.5 23 16 15.5 8.5 8 11.5 5Z"
                fill="currentColor"
              />
            </svg>
          </div>
        </div>
      </div>
    </main>

    <nav class="nav">
      <ul class="nav__list">
        <li class="nav__btn">
          <a href="friends.html">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 32 32"
              fill="none"
            >
              <circle cx="16" cy="9.5" r="5" fill="#000000" />
              <path
                d="M16 17c-6.7 0-12 4.1-12 9.2 0 .5.4.8.8.8h22.4c.4 0 .8-.3.8-.8C28 21.1 22.7 17 16 17Z"
                fill="#000000"
              />
            </svg>
          </a>
        </li>
        <li class="nav__btn">
          <a class="nav__link" href="chats.html">
            <span class="nav__notification">1</span>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 32 32"
              fill="none"
            >
              <path
                d="M6.5 5.5h19a3 3 0 0 1 3 3v11a3 3 0 0 1-3 3H17l-4.8 4.2a.8.8 0 0 1-1.3-.6V22.5H6.5a3 3 0 0 1-3-3v-11a3 3 0 0 1 3-3Z"
                fill="none"
                stroke="#000"
                stroke-width="2"
                stroke-linejoin="round"
              />
            </svg>
          </a>
        </li>
        <li class="nav__btn">
          <a class="nav__link" href="find.html">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 32 32"
              fill="none"
            >
              <circle
                cx="13.5"
                cy="13.5"
                r="8.5"
                stroke="currentColor"
                stroke-width="1.8"
              />
              <line
                x1="19.7"
                y1="19.7"
                x2="27.2"
                y2="27.2"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </svg>
          </a>
        </li>
        <li class="nav__btn">
          <a class="nav__link" href="more.html">
            <span class="nav__reddot"></span>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 32 32"
              fill="none"
            >
              <circle
                cx="6"
                cy="16"
                r="2.6"
                stroke="currentColor"
                stroke-width="1.8"
              />
              <circle
                cx="16"
                cy="16"
                r="2.6"
                stroke="currentColor"
                stroke-width="1.8"
              />
              <circle
                cx="26"
                cy="16"
                r="2.6"
                stroke="currentColor"
                stroke-width="1.8"
              />
            </svg>
          </a>
        </li>
      </ul>
    </nav>
  </body>
</html>
