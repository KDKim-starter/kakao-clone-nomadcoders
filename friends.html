<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends - Kokoa Clone</title>
    <link rel="stylesheet" href="CSS/style.css" />
   
</head>
<body>
    <div class="status-bar">
        <div class="status-bar__column">
            <span>No Service</span>
            <img class="wifi" src="./image2/wifi.png">
        </div>
        <div class="status-bar__column">
            <span>18:43</span>
        </div>
        <div class="status-bar__column">
            <span>110%</span>
           <img name="battery" src="./image2/battery.png">
           <img name="bolt" src="./image2/bolt.png">
        </div>
    </div>

    <nav class="nav">
        <ul class="nav__list">
            <li class="nav__btn"><a href="#"><img src="./image2/friends.png"></a></li>
            <li class="nav__btn">
                <a class="nav__link" href="#">
                    <span class="nav__notification">1</span>
                    <img src="./image2/chat.png"></a>
            </li>
            <li class="nav__btn">
                <a class="nav__link" href="#">
                    <img src="./image2/search.png"></a></li>
            <li class="nav__btn">
                <a class="nav__link" href="#">
                    <span class="nav__reddot"></span>
                    <img src="./image2/find.png"></a></li>
        </ul>
    </nav>

</body>
</html>
