<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>challenge6</title>
    <link rel="stylesheet" href="CSS/challenge6.css" />
  </head>
  <body>
    <div class="main-box">
      <div class="header-lib">
        <i class="fa-solid fa-bars-staggered"></i>
        <span>library</span>
        <i class="fa-solid fa-basket-shopping"></i>
        <form class="main-search">
          <input type="text" placeholder="Search books..." />
          <i class="fa-solid fa-magnifying-glass"></i>
        </form>
      </div>

      <section class="reco">
        <span class="reco-title">Book of the day</span>
        <div class="reco-info">
          <img
            src="https://postfiles.pstatic.net/MjAyMzExMTZfMjY1/MDAxNzAwMTE5MTU3NjY3.JJKxyyJs39ztsXzv_UsVfk43d1OSfJL2Z7ruk6Mrp38g.hPyRnfb5X-kBbBu30X8TBhrJo0bwOlNQWUpi5BYC5mAg.JPEG.sskjojaes/%EB%8B%A4%EC%9A%B4%EB%A1%9C%EB%93%9C.jpg?type=w580"
          />
          <div class="reco-info__text">
            <h3>바다가 들리는 편의점</h3>
            <h5>마치다 소노코</h5>
            <div class="mark-star">
              <i class="fa-solid fa-star"></i>
              <i class="fa-solid fa-star"></i>
              <i class="fa-solid fa-star"></i>
              <i class="fa-solid fa-star"></i>
              <i class="fa-solid fa-star"></i>
            </div>
            <div class="book-type">
              <span>Love</span>
              <span>Japan Fiction</span>
            </div>
            <form class="reco-shop">
              <div class="reco-shop__like">
                <input type="button" />
                <i class="fa-solid fa-bookmark"></i>
              </div>
              <input typue="button" value="Book Now" />
            </form>
          </div>
        </div>
      </section>
    </div>
    <script
      src="https://kit.fontawesome.com/1e02fc2852.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
