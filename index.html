<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome To Kokoa Clone</title>
    <link rel="stylesheet" href="CSS/style.css" />
  </head>
  <body>
    <div class="status-bar">
      <div class="status-bar__column">
        <span>No Service</span>
        <svg
          class="status-bar__column__wifi"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 32 32"
          fill="none"
        >
          <g fill="currentColor">
            <path
              d="M4.5 12.2a1.35 1.35 0 0 1 0-1.9C7.35 7.5 11.43 6 16 6s8.65 1.5 11.5 4.3a1.35 1.35 0 1 1-1.9 1.93C23.25 9.93 19.8 8.7 16 8.7s-7.25 1.23-9.6 3.53a1.35 1.35 0 0 1-1.9-.03Z"
              fill="currentColor"
            />
            <path
              d="M7.85 15.6a1.35 1.35 0 0 1 .05-1.9c2.07-1.97 4.94-3.1 8.1-3.1s6.03 1.13 8.1 3.1a1.35 1.35 0 1 1-1.86 1.96c-1.57-1.5-3.8-2.36-6.24-2.36s-4.67.86-6.24 2.36a1.35 1.35 0 0 1-1.91-.06Z"
              fill="currentColor"
            />
            <path
              d="M11.1 18.95a1.35 1.35 0 0 1 .08-1.9A6.91 6.91 0 0 1 16 15.1c1.9 0 3.65.74 4.82 1.95a1.35 1.35 0 0 1-1.94 1.87A4.22 4.22 0 0 0 16 17.8c-1.18 0-2.27.44-3.02 1.12a1.35 1.35 0 0 1-1.88.03Z"
              fill="currentColor"
            />
            <circle cx="16" cy="22.4" r="2.4" fill="currentColor" />
          </g>
        </svg>
      </div>
      <div class="status-bar__column">
        <span>18:43</span>
      </div>
      <div class="status-bar__column">
        <span>110%</span>
        <svg
          class="status-bar__column__battery"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 32 32"
          fill="none"
        >
          <rect
            x="4"
            y="9"
            width="24"
            height="14"
            rx="2.5"
            stroke="currentColor"
            stroke-width="1.8"
          />
          <rect
            x="28"
            y="12"
            width="2"
            height="8"
            rx="0.8"
            fill="currentColor"
          />
          <rect
            x="6.2"
            y="11.2"
            width="18.6"
            height="9.6"
            rx="1.2"
            fill="currentColor"
          />
        </svg>
        <svg
          class="status-bar__column__bolt"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 32 32"
          fill="none"
        ></svg>
      </div>
    </div>

    <header class="welcome-header">
      <h1 class="welcome-header__title">Welcome to Kokoa Clone</h1>
      <p class="welcome-header__text">
        If you have a Kokoa Account, log in with your email phone number
      </p>
    </header>

    <form action="friends.html" method="get" id="login-form">
      <input name="username" type="text" placeholder="Email or phone number" />
      <input name="password" type="password" placeholder="Password" />
      <input type="submit" value="Log in" />
      <a href="#">Find Kokoa Account or Password</a>
    </form>
    <div id="no-mobile">
      <span>Your screen is too big!!</span>
    </div>
  </body>
</html>
